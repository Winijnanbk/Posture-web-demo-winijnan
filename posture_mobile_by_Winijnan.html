<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050d1a">
<title>Posture</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<style>
:root {
  --bg:      #050d1a;
  --panel:   #0a1628;
  --border:  #0f2545;
  --blue1:   #1a6cf2;
  --blue2:   #3d9bff;
  --blue3:   #7ec8ff;
  --cyan:    #00e5ff;
  --good:    #00e676;
  --warn:    #ff6b35;
  --danger:  #ff1744;
  --text:    #c8deff;
  --muted:   #4a6080;
  --mono:    'Space Mono', monospace;
  --thai:    'Noto Sans Thai', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--thai);
  touch-action: manipulation;
}

/* ── grid bg ── */
body::before {
  content:''; position:fixed; inset:0; z-index:0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 36px 36px;
  opacity:.35; pointer-events:none;
}

/* ═══════════════════════════════════
   DESKTOP LAYOUT
═══════════════════════════════════ */
.app {
  position: relative; z-index:1;
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
  max-width: 1100px;
  margin: 0 auto;
}

header {
  padding: 14px 20px 10px;
  padding-top: calc(14px + var(--safe-top));
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
  background: rgba(5,13,26,.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.logo-ring {
  width: 36px; height: 36px; flex-shrink:0;
  border-radius:50%; border:2px solid var(--blue2);
  display:grid; place-items:center;
  box-shadow: 0 0 14px var(--blue1);
  animation: pulse-ring 2.5s ease-in-out infinite;
}
.logo-ring svg { width:18px; height:18px; fill:var(--blue3); }
@keyframes pulse-ring {
  0%,100% { box-shadow:0 0 14px var(--blue1); }
  50%      { box-shadow:0 0 26px var(--cyan); }
}

h1 {
  font-family: var(--mono);
  font-size: clamp(.9rem, 3vw, 1.3rem);
  letter-spacing:.07em;
  background: linear-gradient(90deg, var(--blue3), var(--cyan));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  flex:1;
}
.version-tag {
  font-family:var(--mono); font-size:.6rem;
  color:var(--muted); border:1px solid var(--border);
  padding:2px 7px; border-radius:20px;
}

.content {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 16px;
  padding: 16px;
  overflow: hidden;
}

/* ─── video panel ─── */
.video-wrap {
  position:relative; border-radius:14px; overflow:hidden;
  border:1px solid var(--border);
  background:#000;
  box-shadow:0 0 30px rgba(26,108,242,.12);
  display:flex; align-items:center; justify-content:center;
  min-height: 200px;
}
video { display:none; }
canvas#canvas {
  display:block; width:100%; height:100%;
  object-fit:contain; border-radius:14px;
}
.scanline {
  position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.07) 3px,rgba(0,0,0,.07) 4px);
  pointer-events:none; border-radius:14px; z-index:2;
}
.corners { position:absolute; inset:0; pointer-events:none; z-index:3; }
.corners span {
  position:absolute; width:20px; height:20px;
  border-color:var(--blue2); border-style:solid; opacity:.9;
}
.corners span:nth-child(1) { top:10px; left:10px;  border-width:2px 0 0 2px; }
.corners span:nth-child(2) { top:10px; right:10px; border-width:2px 2px 0 0; }
.corners span:nth-child(3) { bottom:10px; left:10px;  border-width:0 0 2px 2px; }
.corners span:nth-child(4) { bottom:10px; right:10px; border-width:0 2px 2px 0; }

#flash {
  position:absolute; inset:0; z-index:4;
  background:rgba(255,23,68,.12); border:2px solid var(--danger);
  border-radius:14px; display:none; pointer-events:none;
  animation:flash-anim .5s ease-in-out infinite alternate;
}
@keyframes flash-anim { from{opacity:0} to{opacity:1} }

#canvas-warning {
  position:absolute; inset:0; z-index:5;
  display:none; place-items:center; flex-direction:column; gap:6px;
  pointer-events:none;
}
#canvas-warning.show { display:flex; }
.warn-text {
  font-family:var(--mono);
  font-size:clamp(1rem, 3.5vw, 1.8rem);
  font-weight:700; letter-spacing:.1em;
  color:var(--danger); text-shadow:0 0 24px var(--danger);
  animation:blink .7s step-end infinite;
  text-align:center; padding:0 12px;
}
@keyframes blink { 50%{opacity:0} }
.warn-sub { font-size:clamp(.7rem,2.5vw,.85rem); color:var(--warn); text-align:center; }

/* ─── sidebar ─── */
.sidebar {
  display:flex; flex-direction:column; gap:12px;
  overflow-y:auto; overflow-x:hidden;
  scrollbar-width:none;
}
.sidebar::-webkit-scrollbar { display:none; }

.card {
  background:var(--panel); border:1px solid var(--border);
  border-radius:10px; padding:14px 16px;
  position:relative; overflow:hidden; flex-shrink:0;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,var(--blue1),var(--cyan)); opacity:.6;
}
.card-title {
  font-family:var(--mono); font-size:.6rem; letter-spacing:.1em;
  color:var(--muted); text-transform:uppercase; margin-bottom:10px;
}

/* gauge */
.gauge-wrap { display:flex; justify-content:center; margin-bottom:8px; }
.gauge-svg { width:120px; height:68px; overflow:visible; }
#gauge-arc { transition:stroke-dashoffset .3s ease, stroke .3s; }
.angle-readout {
  text-align:center; font-family:var(--mono);
  font-size:2rem; font-weight:700; line-height:1; transition:color .3s;
}
.angle-unit { font-size:.85rem; color:var(--muted); margin-left:2px; }
.angle-label { text-align:center; font-size:.75rem; color:var(--muted); margin-top:4px; }

/* status */
.status-badge {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:8px; border:1px solid;
  transition:all .4s;
}
.status-dot {
  width:9px; height:9px; border-radius:50%; flex-shrink:0; transition:all .4s;
}
.status-badge.good  { border-color:var(--good);   background:rgba(0,230,118,.06); }
.status-badge.good .status-dot  { background:var(--good); box-shadow:0 0 7px var(--good); }
.status-badge.warn  { border-color:var(--warn);   background:rgba(255,107,53,.06); }
.status-badge.warn .status-dot  { background:var(--warn); box-shadow:0 0 7px var(--warn); }
.status-badge.danger{ border-color:var(--danger); background:rgba(255,23,68,.06); }
.status-badge.danger .status-dot{ background:var(--danger); box-shadow:0 0 10px var(--danger); animation:dot-pulse .6s infinite alternate; }
@keyframes dot-pulse { from{opacity:.5} to{opacity:1} }
.status-text { font-size:.85rem; font-weight:600; }

/* timer */
.timer-label { display:flex; justify-content:space-between; font-size:.7rem; color:var(--muted); margin-bottom:5px; font-family:var(--mono); }
.timer-track { height:7px; background:var(--border); border-radius:4px; overflow:hidden; }
.timer-fill  { height:100%; border-radius:4px; width:0%; transition:width .3s ease, background .3s; background:var(--blue1); }
.smooth-pills { display:flex; gap:3px; flex-wrap:wrap; margin-top:7px; }
.pill { width:12px; height:12px; border-radius:3px; background:var(--border); transition:background .2s; }
.pill.bad  { background:var(--warn); }
.pill.good { background:var(--good); }

/* stats */
.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.stat-item { background:rgba(255,255,255,.02); border:1px solid var(--border); border-radius:7px; padding:9px 11px; }
.stat-val  { font-family:var(--mono); font-size:1.2rem; font-weight:700; color:var(--blue3); }
.stat-desc { font-size:.65rem; color:var(--muted); margin-top:2px; }

/* sliders */
.slider-row { display:flex; align-items:center; gap:10px; font-size:.75rem; }
input[type=range] { flex:1; accent-color:var(--blue2); height:4px; cursor:pointer; }
.slider-val { font-family:var(--mono); font-size:.8rem; color:var(--blue2); min-width:34px; text-align:right; }

/* ═══════════════════════════════════
   MOBILE LAYOUT  (≤ 650px)
═══════════════════════════════════ */
@media (max-width: 650px) {
  html, body { overflow: hidden; height: 100dvh; }

  .app {
    height: 100dvh;
    grid-template-rows: auto 1fr auto;
    max-width: 100%;
  }

  .content {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
    padding: 0;
    gap: 0;
    overflow: hidden;
    position: relative;
  }

  /* video takes full screen */
  .video-wrap {
    border-radius: 0; border: none;
    height: 100%;
    box-shadow: none;
  }
  canvas#canvas { border-radius:0; }

  /* sidebar becomes bottom sheet */
  .sidebar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    flex-direction: row;
    overflow-x: auto; overflow-y: hidden;
    padding: 10px 12px;
    padding-bottom: calc(10px + var(--safe-bot));
    gap: 10px;
    background: rgba(5,13,26,.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    scrollbar-width: none;
    /* drag handle */
  }

  /* each card becomes a horizontal chip */
  .card {
    flex: 0 0 auto;
    min-width: 150px;
    max-width: 180px;
    padding: 10px 12px;
    border-radius: 10px;
  }
  .card::before { height:1.5px; }

  /* angle card is wider */
  .card.card-angle  { min-width: 155px; }
  .card.card-status { min-width: 185px; }
  .card.card-timer  { min-width: 190px; }
  .card.card-stats  { min-width: 200px; }
  .card.card-settings { min-width: 220px; }

  /* compact gauge */
  .gauge-wrap { margin-bottom:4px; }
  .gauge-svg  { width:90px; height:52px; }
  .angle-readout { font-size:1.5rem; }
  .angle-label   { font-size:.65rem; margin-top:2px; }

  /* compact status */
  .status-badge { padding:8px 10px; }
  .status-text  { font-size:.78rem; }

  /* compact stats */
  .stat-val  { font-size:1rem; }
  .stat-desc { font-size:.6rem; }

  /* hide some labels to save space */
  .card-title { font-size:.55rem; margin-bottom:7px; }

  /* warning text larger on mobile */
  .warn-text { font-size:clamp(1.1rem, 5vw, 1.6rem); }

  /* smooth pills smaller */
  .pill { width:10px; height:10px; }
}

/* Portrait phone extra compact */
@media (max-width: 400px) {
  .card { min-width:140px; }
  .card.card-status { min-width:170px; }
}
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-ring">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <h1>POSTURE<span style="color:var(--cyan)"></span></h1>

    <div>
<span class="version-tag">v2.1</span>
<span class="version-tag">by wnj</span>
    </div>
  

  </header>

  <div class="content">
    <!-- video -->
    <div class="video-wrap">
      <video id="video" playsinline autoplay muted></video>
      <canvas id="canvas"></canvas>
      <div class="scanline"></div>
      <div class="corners"><span></span><span></span><span></span><span></span></div>
      <div id="flash"></div>
      <div id="canvas-warning">
        <div class="warn-text">⚠ แก้ไขท่าทางของคุณ!</div>
        <div class="warn-sub">คอยื่นไปข้างหน้านานเกินไป</div>
      </div>
    </div>

    <!-- sidebar / bottom sheet on mobile -->
    <div class="sidebar">

      <div class="card card-angle">
        <div class="card-title">📐 มุมคอ</div>
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 120 68">
            <path d="M8,64 A52,52 0 0,1 112,64" fill="none" stroke="#0f2545" stroke-width="9" stroke-linecap="round"/>
            <path id="gauge-arc" d="M8,64 A52,52 0 0,1 112,64"
              fill="none" stroke="#1a6cf2" stroke-width="9"
              stroke-linecap="round"
              stroke-dasharray="163" stroke-dashoffset="163"/>
          </svg>
        </div>
        <div class="angle-readout" id="angle-num">--<span class="angle-unit">°</span></div>
        <div class="angle-label" id="angle-label">รอการตรวจจับ...</div>
      </div>

      <div class="card card-status">
        <div class="card-title">🔍 สถานะ</div>
        <div class="status-badge good" id="status-badge">
          <div class="status-dot"></div>
          <div class="status-text" id="status-text">เริ่มต้น...</div>
        </div>
      </div>

      <div class="card card-timer">
        <div class="card-title">⏱ ระยะเวลาผิดท่า</div>
        <div class="timer-label">
          <span>0s</span>
          <span id="timer-elapsed">0.0s</span>
          <span id="timer-max">10s</span>
        </div>
        <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
        <div class="smooth-pills" id="smooth-pills"></div>
      </div>

      <div class="card card-stats">
        <div class="card-title">📊 สถิติ</div>
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-val" id="stat-warnings">0</div><div class="stat-desc">เตือน</div></div>
          <div class="stat-item"><div class="stat-val" id="stat-good-pct">--%</div><div class="stat-desc">ท่าดี</div></div>
          <div class="stat-item"><div class="stat-val" id="stat-avg">--°</div><div class="stat-desc">เฉลี่ย</div></div>
          <div class="stat-item"><div class="stat-val" id="stat-max">--°</div><div class="stat-desc">สูงสุด</div></div>
        </div>
      </div>

      <div class="card card-settings">
        <div class="card-title">⚙️ ปรับค่า</div>
        <div class="slider-row">
          <span>มุม</span>
          <input type="range" id="slider-angle" min="5" max="45" value="20">
          <span class="slider-val" id="val-angle">20°</span>
        </div>
        <div class="slider-row" style="margin-top:8px">
          <span>เวลา</span>
          <input type="range" id="slider-time" min="3" max="30" value="10">
          <span class="slider-val" id="val-time">10s</span>
        </div>
      </div>

    </div><!-- /sidebar -->
  </div><!-- /content -->
</div><!-- /app -->

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
let ANGLE_THRESHOLD = 20;
let BAD_TIME_MS     = 10000;
const SMOOTH_N      = 8;

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const angleHistory   = [];
const postureWindow  = [];
let badStartTime     = null;
let warnCount        = 0;
let hasBeepedSession = false;
let totalFrames      = 0;
let goodFrames       = 0;
let sumAngles        = 0;
let maxAngle         = 0;
let audioCtx         = null;

/* ══════════════════════════════════════════
   AUDIO
══════════════════════════════════════════ */
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playAlert() {
  ensureAudio();
  [880, 1100, 880].forEach((freq, i) => {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.18;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.35, t + 0.04);
    gain.gain.linearRampToValueAtTime(0, t + 0.18);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.2);
  });
}

/* ══════════════════════════════════════════
   VIBRATION (mobile) — ถ้ารองรับ
══════════════════════════════════════════ */
function vibrate() {
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

/* ══════════════════════════════════════════
   ANGLE
══════════════════════════════════════════ */
function calculateAngle(ear, shoulder) {
  const dx = ear.x - shoulder.x;
  const dy = ear.y - shoulder.y;
  return Math.abs(Math.atan2(Math.abs(dx), Math.abs(dy)) * 180 / Math.PI);
}
function smoothedAngle() {
  if (!angleHistory.length) return 0;
  let wSum = 0, total = 0;
  angleHistory.forEach((a, i) => { const w=i+1; total+=a*w; wSum+=w; });
  return total / wSum;
}

/* ══════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════ */
const arcTotal = 163;
function updateGauge(angle) {
  const pct    = Math.min(angle / 45, 1);
  const arc    = document.getElementById('gauge-arc');
  arc.style.strokeDashoffset = arcTotal * (1 - pct);
  arc.style.stroke = angle > ANGLE_THRESHOLD
    ? (angle > ANGLE_THRESHOLD*1.5 ? '#ff1744' : '#ff6b35')
    : '#00e676';
}

function setStatus(type, text) {
  const b = document.getElementById('status-badge');
  b.className = 'status-badge ' + type;
  document.getElementById('status-text').textContent = text;
}

function updateTimer(ms) {
  const pct  = Math.min(ms / BAD_TIME_MS * 100, 100);
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.style.background = pct>75 ? 'var(--danger)' : pct>40 ? 'var(--warn)' : 'var(--blue1)';
  document.getElementById('timer-elapsed').textContent = (ms/1000).toFixed(1)+'s';
}

function updatePills(isBad) {
  postureWindow.push(isBad);
  if (postureWindow.length > 18) postureWindow.shift();
  const c = document.getElementById('smooth-pills');
  c.innerHTML = '';
  postureWindow.forEach(b => {
    const d = document.createElement('div');
    d.className = 'pill '+(b?'bad':'good');
    c.appendChild(d);
  });
}

function showWarning(show) {
  document.getElementById('flash').style.display = show ? 'block' : 'none';
  const cw = document.getElementById('canvas-warning');
  show ? cw.classList.add('show') : cw.classList.remove('show');
}

function updateStats() {
  document.getElementById('stat-warnings').textContent = warnCount;
  if (totalFrames > 0) {
    document.getElementById('stat-good-pct').textContent = Math.round(goodFrames/totalFrames*100)+'%';
    document.getElementById('stat-avg').textContent = (sumAngles/totalFrames).toFixed(1)+'°';
  }
  document.getElementById('stat-max').textContent = maxAngle.toFixed(1)+'°';
}

function drawCustomLandmarks(ctx, landmarks, angle) {
  const w = ctx.canvas.width, h = ctx.canvas.height;
  const good = angle <= ANGLE_THRESHOLD;

  drawConnectors(ctx, landmarks, POSE_CONNECTIONS, {
    color: 'rgba(30,130,255,0.45)', lineWidth: 2
  });

  const ear = landmarks[7], sho = landmarks[11];
  if (!ear || !sho) return;

  const ex=ear.x*w, ey=ear.y*h, sx=sho.x*w, sy=sho.y*h;

  ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(sx,sy);
  ctx.strokeStyle = good ? '#00e676' : '#ff1744';
  ctx.lineWidth=3; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);

  [[ex,ey,good?'#00e676':'#ff1744'],[sx,sy,'#3d9bff']].forEach(([x,y,col])=>{
    ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2);
    ctx.fillStyle=col; ctx.shadowBlur=12; ctx.shadowColor=col;
    ctx.fill(); ctx.shadowBlur=0;
  });

  ctx.font = 'bold 15px Space Mono, monospace';
  ctx.fillStyle = good ? '#00e676' : '#ff1744';
  ctx.shadowBlur=8; ctx.shadowColor=ctx.fillStyle;
  ctx.fillText(angle.toFixed(1)+'°', ex+12, ey-6);
  ctx.shadowBlur=0;
}

/* ══════════════════════════════════════════
   MEDIAPIPE onResults
══════════════════════════════════════════ */
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function onResults(results) {
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

  if (!results.poseLandmarks) {
    setStatus('warn','🔍 ไม่พบท่าทาง — กรุณาให้กล้องเห็นร่างกาย');
    return;
  }

  const lm  = results.poseLandmarks;
  const ear = lm[7], sho = lm[11];

  if (ear.visibility < 0.4 || sho.visibility < 0.4) {
    setStatus('warn','⚠️ มองไม่เห็นหูหรือไหล่ชัดเจน');
    drawCustomLandmarks(ctx, lm, 0);
    return;
  }

  angleHistory.push(calculateAngle(ear, sho));
  if (angleHistory.length > SMOOTH_N) angleHistory.shift();
  const angle = smoothedAngle();

  totalFrames++; sumAngles += angle;
  if (angle > maxAngle) maxAngle = angle;

  const isBad = angle > ANGLE_THRESHOLD;
  if (!isBad) goodFrames++;

  drawCustomLandmarks(ctx, lm, angle);
  updateGauge(angle);

  document.getElementById('angle-num').innerHTML = angle.toFixed(1)+'<span class="angle-unit">°</span>';
  document.getElementById('angle-num').style.color = isBad ? 'var(--danger)' : 'var(--good)';
  document.getElementById('angle-label').textContent = isBad ? 'คอยื่น — ผิดท่า' : 'ท่าทางดี ✓';

  updatePills(isBad);

  if (isBad) {
    if (!badStartTime) badStartTime = Date.now();
    const elapsed = Date.now() - badStartTime;
    updateTimer(elapsed);

    if (elapsed >= BAD_TIME_MS) {
      setStatus('danger','🚨 คอยื่น! แก้ไขเดี๋ยวนี้');
      showWarning(true);
      if (!hasBeepedSession) {
        playAlert();
        vibrate();          // ← สั่นโทรศัพท์
        warnCount++;
        hasBeepedSession = true;
      }
    } else {
      setStatus('warn','⚠️ คอยื่น — กำลังนับเวลา...');
      showWarning(false);
      hasBeepedSession = false;
    }
  } else {
    badStartTime = null;
    hasBeepedSession = false;
    updateTimer(0);
    showWarning(false);
    setStatus('good','✅ ท่าทางดี — คงไว้แบบนี้');
  }

  updateStats();
}

/* ══════════════════════════════════════════
   MEDIAPIPE SETUP
   facingMode: 'user' = กล้องหน้า (มือถือ)
══════════════════════════════════════════ */
const pose = new Pose({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
});
pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  enableSegmentation: false,
  minDetectionConfidence: 0.55,
  minTrackingConfidence: 0.55
});
pose.onResults(onResults);

const camera = new Camera(video, {
  onFrame: async () => await pose.send({ image: video }),
  width: 640, height: 480,
  facingMode: 'user'    // ← กล้องหน้า
});
camera.start();

/* ══════════════════════════════════════════
   SLIDERS
══════════════════════════════════════════ */
document.getElementById('slider-angle').addEventListener('input', function() {
  ANGLE_THRESHOLD = parseInt(this.value);
  document.getElementById('val-angle').textContent = this.value+'°';
});
document.getElementById('slider-time').addEventListener('input', function() {
  BAD_TIME_MS = parseInt(this.value)*1000;
  document.getElementById('val-time').textContent = this.value+'s';
  document.getElementById('timer-max').textContent = this.value+'s';
});

/* init pills */
for(let i=0;i<10;i++) postureWindow.push(false);
updatePills(false);

/* ══════════════════════════════════════════
   WAKE LOCK — ป้องกันหน้าจอดับระหว่างใช้งาน
══════════════════════════════════════════ */
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      await navigator.wakeLock.request('screen');
    } catch(e) { /* ไม่รองรับ — ข้ามไป */ }
  }
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
</script>
